<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Administration - Yiwozena Bio</title>
    <style>
        /* Ajoute ton CSS ici ou garde ton lien vers style.css */
        .card-item { border: 1px solid #ccc; padding: 10px; margin: 10px 0; }
        .form-section { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
    </style>
</head>
<body>

<div class="container">
    <div class="form-section">
        <h2>Ajouter un plat au menu</h2>
        <input type="text" id="plat-nom" placeholder="Nom du plat (ex: Poulet Yassa)">
        <input type="number" id="plat-prix" placeholder="Prix (en FCFA)">
        <input type="text" id="plat-image" placeholder="Lien de l'image (URL) - Optionnel">
        <button onclick="ajouterAuMenu()">Ajouter le plat</button>
    </div>

    <div id="menu-admin-liste">
        </div>
</div>

<script>
    // Charger les plats au démarrage
    document.addEventListener('DOMContentLoaded', chargerDonneesAdmin);

    async function chargerDonneesAdmin() {
        try {
            const res = await fetch('/api/repas');
            const plats = await res.json();
            const liste = document.getElementById('menu-admin-liste');
            
            liste.innerHTML = plats.map(p => `
                <div class="card-item">
                    <strong>${p.nom}</strong><br>
                    <small>${p.prix} FCFA</small><br>
                    <button onclick="supprimerDuMenu('${p._id}')">Supprimer</button>
                </div>
            `).join('');
        } catch (err) {
            console.error("Erreur chargement :", err);
        }
    }

    async function ajouterAuMenu() {
        const nom = document.getElementById('plat-nom').value;
        const prix = document.getElementById('plat-prix').value;
        const image = document.getElementById('plat-image').value;

        // On envoie exactement ce que le modèle attend : 'nom' et 'prix'
        const bodyData = { nom, prix };
        if (image) bodyData.image = image;

        try {
            const response = await fetch('/api/repas/add', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(bodyData)
            });

            if (response.ok) {
                document.getElementById('plat-nom').value = "";
                document.getElementById('plat-prix').value = "";
                document.getElementById('plat-image').value = "";
                chargerDonneesAdmin(); // Recharger la liste
            } else {
                alert("Erreur lors de l'ajout du plat");
            }
        } catch (err) {
            console.error("Erreur lors de l'ajout :", err);
        }
    }

    async function supprimerDuMenu(id) {
        if (confirm("Retirer ce plat ?")) {
            try {
                await fetch(`/api/repas/${id}`, { method: 'DELETE' });
                chargerDonneesAdmin();
            } catch (err) {
                console.error("Erreur suppression :", err);
            }
        }
    }
</script>

</body>
</html>
